# ─────────────────────────────────────────────────────────────────────────────
# RAGSmith – Nginx reverse proxy configuration
# Place at: /etc/nginx/sites-available/ragsmith
# Enable:   sudo ln -s /etc/nginx/sites-available/ragsmith /etc/nginx/sites-enabled/
# Reload:   sudo nginx -t && sudo systemctl reload nginx
# ─────────────────────────────────────────────────────────────────────────────

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=upload:10m rate=10r/m;

server {
    listen 80;
    server_name _;          # Replace _ with your domain or EC2 public IP

    # Security headers
    add_header X-Frame-Options          "SAMEORIGIN"  always;
    add_header X-XSS-Protection         "1; mode=block" always;
    add_header X-Content-Type-Options   "nosniff"     always;
    add_header Referrer-Policy          "no-referrer-when-downgrade" always;

    # Upload size limit (must match MAX_UPLOAD_MB in .env)
    client_max_body_size 55M;

    # Logging
    access_log /var/log/nginx/ragsmith_access.log;
    error_log  /var/log/nginx/ragsmith_error.log;

    # ── Static files — serve directly from Nginx (faster) ────────────────────
    location /static/ {
        alias /home/ragsmith/app/static/;
        expires 7d;
        add_header Cache-Control "public, immutable";
        gzip_static on;
    }

    # ── Upload endpoint — stricter rate limit ────────────────────────────────
    location ~ ^/api/documents/[0-9]+/upload$ {
        limit_req zone=upload burst=5 nodelay;
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # ── Query endpoint — longer timeout for LLM generation ───────────────────
    location /api/query/ {
        limit_req zone=api burst=10 nodelay;
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 180s;     # Groq can take a moment on first request
        proxy_send_timeout 180s;
    }

    # ── All other requests ────────────────────────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_buffering    off;
    }

    # ── Health check (no rate limit, used by ALB/monitoring) ─────────────────
    location /health {
        proxy_pass http://127.0.0.1:8000/health;
        access_log off;
    }
}

